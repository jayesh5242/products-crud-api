# ===============================
# APP INFO
# ===============================
spring.application.name=Products_CRUD_API

# ===============================
# SERVER
# ===============================
# PORT is set by Railway automatically ? ${PORT:8081} means
# use Railway PORT env var, or fall back to 8081 on local
server.port=${PORT:8081}

# ===============================
# DATABASE (POSTGRESQL)
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/product_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_DDL:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:my-super-secret-key-my-super-secret-key}
jwt.expiration=${JWT_EXPIRATION:600000}
jwt.refresh-token-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ===============================
# APP CONFIG
# ===============================
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
app.reset-token-expiry-minutes=60

# ===============================
# MAIL CONFIG
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
# Required for Gmail SMTP to work
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true